fragment Recipe on Recipe {
  stage
  remoteId: id
  createdAt
  updatedAt
  publishedAt
  title
  content {
    ... on RichText {
      raw
      html
      markdown
      text
    }
  }
  markdown
  tags
  servings
  rating
  coverImage {
    ... on Asset {
      remoteTypeName: __typename
      remoteId: id
      locale
    }
  }
}